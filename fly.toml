# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'troop77-app'
primary_region = 'sjc'

[build]
dockerfile = 'Dockerfile'

[env]
LOG_LEVEL = 'info'

[http_service]
internal_port = 8080
#  force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[http_service.checks]]
interval = '10s'
timeout = '2s'
grace_period = '5s'
method = 'get'
path = '/healthcheck'
protocol = 'http'
tls_skip_verify = false

[[http_service.checks]]
interval = '1m0s'
timeout = '2s'
grace_period = '5s'
method = 'get'
path = '/deepcheck'
protocol = 'http'
tls_skip_verify = false

[deploy]
release_command = "/usr/local/bin/migrate"

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
