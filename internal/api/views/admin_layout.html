{{define "admin_layout.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Scout Events</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; background: #fafafa; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #1a1a2e; color: #fff; }
        .admin-header h1 { font-size: 1.25rem; }
        .admin-header a { color: #90caf9; text-decoration: none; font-size: 0.875rem; }
        .admin-header a:hover { text-decoration: underline; }
        .admin-body { display: flex; min-height: calc(100vh - 57px); }
        .admin-sidebar { width: 220px; background: #16213e; padding: 16px 0; flex-shrink: 0; }
        .admin-sidebar a { display: block; padding: 10px 24px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; transition: all 0.15s; }
        .admin-sidebar a:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .admin-sidebar a.active { color: #fff; background: rgba(255,255,255,0.12); border-left: 3px solid #90caf9; }
        .admin-content { flex: 1; padding: 24px; overflow-y: auto; }
        .error { background:#ffebee; color:#c62828; border:1px solid #ef9a9a; border-radius:6px; padding:10px 14px; margin-bottom:16px; font-size:0.875rem; }
        .warning { background:#fff8e1; color:#e65100; border:1px solid #ffe082; border-radius:6px; padding:10px 14px; margin-bottom:16px; font-size:0.875rem; }
        .htmx-indicator { opacity:0; transition:opacity 200ms; }
        .htmx-request .htmx-indicator { opacity:1; }
        .htmx-request.htmx-indicator { opacity:1; }
    </style>
    <script>
        document.addEventListener('htmx:afterSettle', function() {
            var path = window.location.pathname;
            document.querySelectorAll('.admin-sidebar a').forEach(function(a) {
                a.classList.toggle('active', a.getAttribute('href') === path);
            });
        });
    </script>
</head>
<body>
    <div class="admin-header">
        <h1>Admin</h1>
        <a href="/events">&larr; Back to events</a>
    </div>
    <div class="admin-body">
        <nav class="admin-sidebar">
            <a href="/admin/roster" class="active"
               hx-get="/admin/roster"
               hx-target="#admin-content"
               hx-swap="innerHTML"
               hx-push-url="true">Roster</a>
            <a href="/admin/sync"
               hx-get="/admin/sync"
               hx-target="#admin-content"
               hx-swap="innerHTML"
               hx-push-url="true">Sync</a>
        </nav>
        <div class="admin-content" id="admin-content">
            {{template "content_panel" .}}
        </div>
    </div>
</body>
</html>
{{end}}
