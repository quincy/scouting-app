{{define "admin_layout.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Scout Events</title>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/app.css">
    <script>
        document.addEventListener('htmx:afterSettle', function() {
            var path = window.location.pathname;
            document.querySelectorAll('.admin-sidebar a').forEach(function(a) {
                a.classList.toggle('active', a.getAttribute('href') === path);
            });
        });
    </script>
</head>
<body>
    <div class="admin-header">
        <h1>Admin</h1>
        <a href="/events">&larr; Back to events</a>
    </div>
    <div class="admin-body">
        <nav class="admin-sidebar">
            <a href="/admin/roster"
               hx-get="/admin/roster"
               hx-target="#admin-content"
               hx-swap="innerHTML"
               hx-push-url="true">Roster</a>
            <a href="/admin/connections"
               hx-get="/admin/connections"
               hx-target="#admin-content"
               hx-swap="innerHTML"
               hx-push-url="true">Connections</a>
            <a href="/admin/sync"
               hx-get="/admin/sync"
               hx-target="#admin-content"
               hx-swap="innerHTML"
               hx-push-url="true">Sync</a>
            <a href="/admin/roles"
               hx-get="/admin/roles"
               hx-target="#admin-content"
               hx-swap="innerHTML"
               hx-push-url="true">Roles</a>
        </nav>
        <div class="admin-content" id="admin-content">
            {{template "content_panel" .}}
        </div>
    </div>
</body>
</html>
{{end}}
