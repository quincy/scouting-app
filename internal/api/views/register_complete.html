{{define "register_complete.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Password - Scout Events</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<body class="auth-page">
    <h1 class="centered">Create Your Password</h1>
    <div class="auth-card">
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/register/complete" id="register-form">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <div id="pw-error" class="error" style="display:none;"></div>
            <button type="submit" class="full-width">Complete Registration</button>
        </form>
    </div>
    <script>
    document.getElementById('register-form').addEventListener('submit', function(e) {
        var pw = document.getElementById('password').value;
        var confirm = document.getElementById('confirm-password').value;
        if (pw !== confirm) {
            e.preventDefault();
            var err = document.getElementById('pw-error');
            err.textContent = 'Passwords do not match.';
            err.style.display = 'block';
        }
    });
    </script>
</body>
</html>
{{end}}
