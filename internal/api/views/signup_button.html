{{define "signup_button.html"}}
<div id="signup-section">
    {{if .IsPast}}
        <p style="color: #888; font-style: italic; margin-bottom: 16px;">This event has ended.</p>
    {{else}}
        {{range .Profiles}}
        <div class="profile-signup-row" id="profile-{{.ProfileID}}">
            <span>{{.ProfileName}}</span>
            {{if .IsAttending}}
            <button class="btn-withdraw" hx-post="/events/{{$.EventID}}/withdraw?profile_id={{.ProfileID}}" hx-target="#signup-section" hx-swap="outerHTML">
                Withdraw
            </button>
            {{else}}
            <button class="btn-signup" hx-post="/events/{{$.EventID}}/signup?profile_id={{.ProfileID}}" hx-target="#signup-section" hx-swap="outerHTML">
                Sign Up
            </button>
            {{end}}
        </div>
        {{end}}
    {{end}}
</div>
{{end}}
