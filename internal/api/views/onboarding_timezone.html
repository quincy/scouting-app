{{define "onboarding_timezone.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone - Scout Events Setup</title>
    <link rel="stylesheet" href="/static/app.css">
    <style>
        .onboarding-page { max-width: 520px; margin: 0 auto; padding: 64px 24px; }
        .onboarding-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .step-indicator { text-align: center; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }
        .progress-bar { display: flex; gap: 6px; margin-bottom: 24px; justify-content: center; }
        .progress-step { width: 32px; height: 4px; border-radius: 2px; background: #e0e0e0; }
        .progress-step.active { background: #1565c0; }
        .progress-step.done { background: #2e7d32; }
        .onboarding-card h1 { text-align: center; font-size: 1.35rem; margin-bottom: 4px; }
        .onboarding-card .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 28px; }
        select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; background: #fff; }
        select:focus { outline: none; border-color: #1565c0; box-shadow: 0 0 0 2px rgba(21,101,192,0.15); }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn-group .btn-back { flex: 0 0 auto; background: #fff; color: #555; border: 1px solid #ccc; border-radius: 8px; padding: 14px 24px; font-size: 1rem; cursor: pointer; text-decoration: none; text-align: center; }
        .btn-group .btn-back:hover { background: #f5f5f5; }
        .btn-group .btn-next { flex: 1; background: #1565c0; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 1.05rem; font-weight: 600; cursor: pointer; }
        .btn-group .btn-next:hover { background: #0d47a1; }
        .timezone-note { text-align: center; font-size: 0.85rem; color: #888; margin-top: 16px; }
    </style>
</head>
<body class="onboarding-page">
    <div class="onboarding-card">
        <div class="step-indicator">Step 4 of 4</div>
        <div class="progress-bar">
            <span class="progress-step done"></span>
            <span class="progress-step done"></span>
            <span class="progress-step done"></span>
            <span class="progress-step active"></span>
        </div>
        <h1>Default Timezone</h1>
        <p class="subtitle">Set your unit's default timezone. IANA timezones handle daylight saving automatically.</p>
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        <form method="POST" action="/onboard/timezone">
            <input type="hidden" name="first_name" value="{{.FirstName}}">
            <input type="hidden" name="last_name" value="{{.LastName}}">
            <input type="hidden" name="email" value="{{.Email}}">
            <input type="hidden" name="bsa_id" value="{{.BSAID}}">
            <input type="hidden" name="unit_type" value="{{.UnitType}}">
            <input type="hidden" name="unit_number" value="{{.UnitNumber}}">
            <input type="hidden" name="org_guid" value="{{.OrgGUID}}">
            <div class="form-group">
                <label for="timezone">Timezone</label>
                <select id="timezone" name="timezone" required>
                    <option value="">Select timezone...</option>
                    {{range .Timezones}}
                    <option value="{{.Value}}" {{if .Selected}}selected{{end}}>{{.Label}}</option>
                    {{end}}
                </select>
            </div>
            <p class="timezone-note">You can change this later in settings.</p>
            <div class="btn-group">
                <a href="javascript:history.back()" class="btn-back">Back</a>
                <button type="submit" class="btn-next">Continue</button>
            </div>
        </form>
    </div>
</body>
</html>
{{end}}
