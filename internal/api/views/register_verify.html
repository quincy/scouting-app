{{define "register_verify.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email - Scout Events</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<body class="auth-page">
    <h1 class="centered small-margin">Verify Your Email</h1>
    <p class="subtitle">We sent a code to {{.MaskedEmail}}</p>
    <div class="auth-card">
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/register/verify">
            <input type="hidden" name="otp_id" value="{{.OTPID}}">
            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" name="code" class="otp-code" pattern="[0-9]{6}" inputmode="numeric" maxlength="6" placeholder="000000" required autofocus>
            </div>
            <button type="submit" class="full-width">Verify Code</button>
        </form>
        <div class="link">Didn't receive the code? <a href="/register">Start over</a></div>
    </div>
</body>
</html>
{{end}}
