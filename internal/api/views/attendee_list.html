{{define "attendee_list.html"}}
<span id="attendee-count" hx-swap-oob="true">({{.AttendeeCount}})</span>
<ul class="attendee-list" id="attendee-list" hx-swap-oob="true">
    {{range .Attendees}}
    <li{{if .IsYou}} class="you"{{end}}>
        {{.Email}}{{if .IsYou}} (you){{end}}
    </li>
    {{end}}
</ul>
{{end}}
