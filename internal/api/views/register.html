{{define "register.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account - Scout Events</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<body class="auth-page">
    <h1 class="centered">Create Your Account</h1>
    <div class="auth-card">
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="full-width">Send Verification Code</button>
        </form>
        <div class="link">Already have an account? <a href="/login">Sign in</a></div>
    </div>
</body>
</html>
{{end}}
